name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *' # poll Notion for newly published/edited posts
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.sync.outputs.changed == 'true' || github.event_name != 'schedule' }}
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run sync
      # Committing synced content keeps the repo active so GitHub doesn't
      # disable this scheduled workflow after 60 days of inactivity.
      - name: Commit synced content
        id: sync
        run: |
          git add src/content/blog public/images/blog
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "content: Sync from Notion [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - run: npm run build
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
      - uses: actions/upload-pages-artifact@v3
        if: steps.sync.outputs.changed == 'true' || github.event_name != 'schedule'
        with:
          path: dist/

  deploy:
    needs: build
    if: needs.build.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
